<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoneyUp</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background-color:#e8c9f1;
font-family:'Poppins',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:95%;
max-width:1200px;
background:#e8c9f1;
border-radius:18px;
padding:50px 60px;
display:grid;
grid-template-columns:1.1fr 0.9fr;
gap:40px;
align-items:center;
}

/* ESQUERDA */

.left h1{
font-family:'Playfair Display',serif;
font-size:48px;
color:#2b1c46;
margin-bottom:25px;
}

.left h2{
font-size:26px;
font-weight:500;
color:#2b1c46;
line-height:1.4;
margin-bottom:15px;
}

.left p{
font-size:16px;
color:#555;
max-width:460px;
margin-bottom:35px;
}

/* GRÁFICO */

.graph-area{
position:relative;
display:flex;
align-items:flex-end;
gap:10px;
margin-bottom:35px;
}

.bar{
width:26px;
background:#4b66f0;
border-radius:6px 6px 0 0;
z-index:1;
}

.b1{height:45px;}
.b2{height:70px;}
.b3{height:95px;}
.b4{height:120px;}
.b5{height:145px;}

.arrow{
position:absolute;
left:-5px;
bottom:70px;
width:220px;
height:4px;
background:#3bb273;
transform:rotate(-12deg);
border-radius:3px;
z-index:2;
}

.arrow::after{
content:'';
position:absolute;
right:-8px;
top:-6px;
border-left:12px solid #3bb273;
border-top:8px solid transparent;
border-bottom:8px solid transparent;
}

/* BOTÃO */

.btn{
display:inline-block;
padding:14px 50px;
background:#dce9c8;
border-radius:30px;
border:2px solid #b7c9a1;
color:#2b1c46;
font-weight:500;
text-decoration:none;
transition:0.3s;
cursor:pointer;
}

.btn:hover{
background:#cbdcb2;
}

.btn-center{
display:flex;
justify-content:center;
margin-top:10px;
}

/* DIREITA */

.right{
text-align:center;
}

.money-icon{
font-size:120px;
margin-bottom:25px;
}

.right p{
font-size:16px;
color:#6a5acd;
font-style:italic;
}

.right span{
display:block;
font-size:14px;
color:#555;
font-style:normal;
margin-top:6px;
}

@media (max-width:900px){
.container{
grid-template-columns:1fr;
text-align:center;
}

.left p{
margin:0 auto 35px;
}

.graph-area{
justify-content:center;
}

.arrow{
display:none;
}
}

</style>
</head>

<body>

<section class="container">

<div class="left">

<h1 id="logo"></h1>

<h2 id="title"></h2>

<p id="subtitle"></p>

<div class="graph-area">
<div class="bar b1"></div>
<div class="bar b2"></div>
<div class="bar b3"></div>
<div class="bar b4"></div>
<div class="bar b5"></div>
<div class="arrow"></div>
</div>

<div class="btn-center">
<button class="btn" id="startBtn">Começar</button>
</div>

</div>

<div class="right">

<div class="money-icon">💰</div>

<p id="cta">
<span id="desc"></span>
</p>

</div>

</section>

<script type="module">

//  JSON (dados da página)
const dados = {
  logo: "MoneyUp",
  title: "Transformando jovens em mestres da organização financeira",
  subtitle: "Aprenda, pratique e evolua com ferramentas simples e divertidas.",
  cta: "Pronto para evoluir suas finanças?",
  desc: "Acesse a educação financeira inteligente"
};

// Geração dinâmica
document.getElementById("logo").textContent = dados.logo;
document.getElementById("title").textContent = dados.title;
document.getElementById("subtitle").textContent = dados.subtitle;
document.getElementById("cta").childNodes[0].nodeValue = dados.cta;
document.getElementById("desc").textContent = dados.desc;

// Evento
document.getElementById("startBtn").addEventListener("click", () => {
  alert("Bem-vindo ao MoneyUp!");
});

</script>

</body>
</html>
