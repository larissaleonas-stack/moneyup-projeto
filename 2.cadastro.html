-- Tela Cadastro

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoneyUp - Cadastro</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
background:#e8c9f1;
font-family:'Poppins',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
}

header{
width:100%;
max-width:1200px;
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 40px 10px;
}

header h1{
font-family:'Playfair Display',serif;
font-size:48px;
color:#000;
}

header span{
font-style:italic;
font-size:20px;
color:#000;
}

.card{
background:#ffffff;
border-radius:35px;
padding:40px 50px;
width:90%;
max-width:750px;
margin-top:10px;
}

.form-group{
display:grid;
grid-template-columns:220px 1fr;
align-items:center;
gap:15px;
margin-bottom:14px;
}

.form-group label{
font-size:15px;
color:#333;
}

.form-group input{
height:38px;
border-radius:10px;
border:none;
background:#f1eded;
padding:0 12px;
outline:none;
font-size:14px;
}

.form-group input::placeholder{
color:#b9b9b9;
}

.checks{
margin-top:10px;
}

.check-item{
display:flex;
align-items:flex-start;
gap:10px;
margin-top:10px;
font-size:14px;
color:#333;
}

.check-item input{
width:18px;
height:18px;
margin-top:2px;
}

.btn-area{
display:flex;
justify-content:center;
margin-top:25px;
}

.btn-cadastrar{
padding:12px 50px;
background:#dce9c8;
border:2px solid #b7c9a1;
border-radius:30px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

.btn-cadastrar:hover{
background:#cbdcb2;
}

/* mensagem */

#mensagem{
text-align:center;
margin-top:15px;
font-weight:500;
color:green;
display:none;
}

@media(max-width:600px){

header h1{
font-size:36px;
}

.card{
padding:30px 25px;
}

.form-group{
grid-template-columns:1fr;
gap:6px;
}

.form-group label{
font-size:14px;
}

}

</style>
</head>

<body>

<header>
<h1>MoneyUp</h1>
<span>Cadastro</span>
</header>

<div class="card">

<div class="form-group">
<label>Seu nome completo</label>
<input type="text" placeholder="Digite seu nome completo">
</div>

<div class="form-group">
<label>Seu telefone</label>
<input type="tel" placeholder="Digite seu telefone">
</div>

<div class="form-group">
<label>Seu e-mail</label>
<input type="email" placeholder="Digite seu email">
</div>

<div class="form-group">
<label>Senha</label>
<input type="password" placeholder="Digite uma senha">
</div>

<div class="form-group">
<label>Confirme sua senha</label>
<input type="password" placeholder="Confirme sua senha">
</div>

<div class="checks">

<div class="check-item">
<input type="checkbox">
<span>Eu aceito os Termos de Consentimento e Política de Uso</span>
</div>

<div class="check-item">
<input type="checkbox">
<span>Aceito receber informações e comunicações</span>
</div>

<div class="btn-area">
<button class="btn-cadastrar" onclick="cadastrar()">Cadastrar</button>
</div>

<p id="mensagem">Cadastro com sucesso!</p>

</div>

</div>

<script>

function cadastrar(){
document.getElementById("mensagem").style.display="block";
}

</script>

</body>
</html>
